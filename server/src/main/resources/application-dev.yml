---
# ═══════════════════════════════════════════════════
# DEV PROFILE OVERRIDES
# ═══════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev

  devtools:
    restart:
      enabled: true

logging:
  level:
    ai.ultimate: DEBUG
    org.springframework.security: DEBUG

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs

---